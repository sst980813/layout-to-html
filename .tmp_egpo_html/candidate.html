<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide Presentation</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      background: linear-gradient(to bottom, #3498db, #2980b9);
      display: grid;
      place-items: center;
    }
    .slide-container {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }
    .slide-content {
      background: rgba(255, 255, 255, 0.8);
      padding: 20px;
      border-radius: 10px;
    }
    .text-content {
      font-size: clamp(24px, 2.5vw, 48px);
      color: #2c3e50;
    }
    .icon {
      background: url('output/images/slide_15_img_12936752320.png') no-repeat center;
      background-size: cover;
      width: 119px;
      height: 118px;
    }
    .image-content {
      background: url('output/images/slide_15_img_12936752224.png') no-repeat center;
      background-size: cover;
      width: 251px;
      height: 179px;
    }
    .title {
      font-size: 72px;
      color: white;
      font-weight: bold;
    }
    .subtitle {
      font-size: 36px;
      color: #34495e;
    }
    .decorative-shape {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, #e74c3c, #c0392b);
      clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <div id="b0_c0" class="slide-content" data-json-id="b0_c0">
      <div id="b0_c3" class="title">感谢您的观看</div>
      <div id="b0_c4" class="subtitle">THANK YOU FOR WATCHING</div>
    </div>
    <div id="b0_c1" class="icon" data-json-id="b0_c1"></div>
    <div id="b0_c2" class="image-content" data-json-id="b0_c2"></div>
    <div id="b0_c5" class="image-content" data-json-id="b0_c5"></div>
  </div>
  <div class="decorative-shape"></div>
</body>
</html>
