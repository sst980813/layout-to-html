<!--
Step1 布局结构分析:
- Layout pattern: 混合布局 (标题行 + 主内容区 + 侧边数字)
- Rows/Cols grouping: 
  - 顶部标题为水平排列的4个文本块
  - 主内容区为垂直排列的文本+图片+文本
  - 侧边独立数字标记
- Alignment: 
  - 标题文本水平居中排列
  - 主内容左对齐
- Spacing: 
  - 标题块之间有均匀间距
  - 主内容区元素有较大垂直间距
- Visual hierarchy: 
  - 主标题"降低生产成本"最大最显眼
  - 副标题和正文形成次级层次
  - 侧边数字作为装饰性元素
-->

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>成本管理演示</title>
    <style>
        :root {
            --primary-color: #2a5caa;
            --secondary-color: #4a90e2;
            --accent-color: #ff7e5f;
            --text-dark: #333;
            --text-light: #fff;
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Microsoft YaHei', sans-serif;
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .slide {
            width: 1920px;
            height: 1080px;
            background: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr;
            grid-template-rows: auto 1fr;
            padding: 40px;
            box-sizing: border-box;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 60px;
            padding: 20px 0;
            border-bottom: 2px solid var(--secondary-color);
        }
        
        .header-item {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 24px;
            color: var(--primary-color);
            font-weight: bold;
            position: relative;
        }
        
        .header-item::after {
            content: '';
            position: absolute;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            width: 40px;
            height: 4px;
            background: var(--accent-color);
            border-radius: 2px;
        }
        
        .content {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 40px;
        }
        
        .sidebar {
            display: flex;
            align-items: flex-start;
            justify-content: center;
        }
        
        .sidebar-number {
            font-size: 120px;
            font-weight: bold;
            color: rgba(42, 92, 170, 0.1);
        }
        
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .main-title {
            font-size: 72px;
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .image-container {
            width: 100%;
            height: 400px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .description {
            font-size: 28px;
            line-height: 1.6;
            color: var(--text-dark);
            background: rgba(255, 255, 255, 0.8);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="header">
            <div id="b0_c0" data-json-id="b0_c0" class="header-item">降低生产成本</div>
            <div id="b0_c1" data-json-id="b0_c1" class="header-item">成本控制实操</div>
            <div id="b0_c2" data-json-id="b0_c2" class="header-item">精益成本管理</div>
            <div id="b0_c3" data-json-id="b0_c3" class="header-item">成本控制体系</div>
        </div>
        
        <div class="content">
            <div class="sidebar">
                <div id="b2" data-json-id="2" class="sidebar-number">01</div>
            </div>
            
            <div class="main-content">
                <div id="b1_c0" data-json-id="b1_c0" class="main-title">降低生产成本</div>
                
                <div class="image-container">
                    <img id="b1_c1" data-json-id="b1_c1" src="output/images/slide_2_img_5703393424.png" alt="成本管理示意图">
                </div>
                
                <div id="b1_c2" data-json-id="b1_c2" class="description">
                    单击此处输入你的正文，文字是您思想的提炼，为了最终演示发布的良好效果，请尽量言简意赅的阐述观点；根据需要可酌情增减文字，以便观者可以准确理解您所传达的信息。
                </div>
            </div>
        </div>
    </div>
</body>
</html>
