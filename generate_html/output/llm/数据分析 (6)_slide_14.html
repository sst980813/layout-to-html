<!--
Step1 布局结构分析:
  - Layout pattern: 单元素居中布局
  - Rows/Cols grouping: 单一图片元素
  - Alignment: 完全居中
  - Spacing: 无间距需求
  - Visual hierarchy: 图片作为唯一视觉焦点
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>幻灯片</title>
    <style>
        :root {
            --slide-width: 1920px;
            --slide-height: 1080px;
            --primary-color: #4a6bdf;
            --secondary-color: #8a63e9;
        }
        
        body {
            margin: 0;
            padding: 0;
            display: grid;
            place-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        .slide {
            width: var(--slide-width);
            height: var(--slide-height);
            display: grid;
            place-items: center;
            background: radial-gradient(circle at center, rgba(255,255,255,0.9) 0%, rgba(245,245,245,0.8) 100%);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }
        
        .slide::before {
            content: "";
            position: absolute;
            width: 300%;
            height: 300%;
            top: -100%;
            left: -100%;
            background: conic-gradient(
                from 0deg at 50% 50%,
                rgba(74, 107, 223, 0.05) 0deg,
                rgba(138, 99, 233, 0.05) 90deg,
                rgba(74, 107, 223, 0.05) 180deg,
                rgba(138, 99, 233, 0.05) 270deg,
                rgba(74, 107, 223, 0.05) 360deg
            );
            z-index: -1;
            animation: rotate 60s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .image-container {
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
            padding: 40px;
            box-sizing: border-box;
        }
        
        .image-wrapper {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .image-wrapper:hover {
            transform: scale(1.02);
        }
        
        .slide-image {
            display: block;
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.1));
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="image-container">
            <div class="image-wrapper">
                <img id="img_0" data-json-id="0" class="slide-image" src="output/images/slide_14_img_5375656880.png" alt="">
            </div>
        </div>
    </div>
</body>
</html>
