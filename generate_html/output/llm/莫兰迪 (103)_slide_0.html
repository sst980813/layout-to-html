<!--
Step1 布局结构分析:
- Layout pattern: 全屏背景图片覆盖，叠加中心文本区域
- Rows/Cols grouping: 垂直堆叠的标题和正文
- Alignment: 标题和正文水平居中
- Spacing: 标题和正文之间有较大垂直间距
- Visual hierarchy: 大标题为主视觉焦点，正文为次要内容
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORIMOTO</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            overflow: hidden;
        }
        
        .slide {
            width: 1920px;
            height: 1080px;
            position: relative;
            display: grid;
            place-items: center;
            background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.1) 0%, transparent 50%);
        }
        
        .slide::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(0,0,0,0.3) 0%, transparent 100%);
            z-index: 1;
        }
        
        .background-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            z-index: 0;
        }
        
        .content-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            max-width: 80%;
            z-index: 2;
            position: relative;
        }
        
        .title {
            font-size: 85px;
            font-weight: 700;
            color: white;
            text-shadow: 0 4px 20px rgba(0,0,0,0.5);
            background: linear-gradient(90deg, #ffffff 0%, #e6e6e6 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            line-height: 1.2;
        }
        
        .text-content {
            font-size: 24px;
            color: rgba(255,255,255,0.9);
            text-align: center;
            line-height: 1.6;
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
            max-width: 977px;
        }
        
        .floating-icon {
            position: absolute;
            width: 96px;
            height: 96px;
            z-index: 3;
            left: 5%;
            top: 40%;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="slide">
        <img id="bg-img" data-json-id="b0_c0" class="background-image" src="output/images/slide_0_img_4964800400.png" alt="Background">
        
        <div class="content-container">
            <h1 id="title" data-json-id="b0_c1" class="title">MORIMOTO</h1>
            <p id="content" data-json-id="b0_c2" class="text-content">
                I walked through many mountains, walked through many waters, and knew many people. The only thing that really makes me tempted is that you see me at the moment. But there is not too much extravagant hope, but I hope to have your heart, not to leave.
            </p>
        </div>
        
        <img id="floating-icon" data-json-id="1" class="floating-icon" src="output/images/slide_0_img_4964800496.png" alt="Floating icon">
    </div>
</body>
</html>
