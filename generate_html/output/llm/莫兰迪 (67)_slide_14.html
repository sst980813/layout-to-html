<!--
Step1 布局结构分析:
- Layout pattern: 混合布局（左侧文本+右侧图片网格）
- Rows/Cols grouping: 
  - 顶部：Part 04 文本（单行）
  - 中部：左侧文本列 + 右侧图片网格
  - 底部：分散装饰图片
- Alignment: 
  - 主内容区左对齐
  - 图片组右对齐
- Spacing: 
  - 主标题与内容间距约150px
  - 文本段落间距约130px
- Visual hierarchy: 
  - 章节标题 > 副标题 > 正文
  - 右侧主图视觉权重最高
-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Slide</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap');
        
        :root {
            --primary: #4F46E5;
            --secondary: #10B981;
            --accent: #F59E0B;
            --dark: #1F2937;
            --light: #F3F4F6;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Montserrat', sans-serif;
            background: radial-gradient(circle at 70% 30%, #f0f9ff, #e0f2fe);
        }
        
        .slide {
            width: 1920px;
            height: 1080px;
            display: grid;
            grid-template-rows: auto 1fr;
            padding: 80px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        
        .slide::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 800px;
            height: 800px;
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1) 0%, rgba(16, 185, 129, 0.05) 100%);
            border-radius: 50%;
            z-index: -1;
        }
        
        .header {
            grid-column: 1 / -1;
            margin-bottom: 40px;
        }
        
        .part-number {
            font-size: 72px;
            font-weight: 800;
            color: var(--primary);
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 80px;
        }
        
        .content-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            height: 100%;
        }
        
        .text-content {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .chapter-title {
            font-size: 44px;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 40px;
            position: relative;
        }
        
        .chapter-title::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 80px;
            height: 4px;
            background: var(--accent);
        }
        
        .chapter-text {
            font-size: 24px;
            line-height: 1.6;
            color: var(--dark);
            opacity: 0.8;
            margin-bottom: 60px;
        }
        
        .image-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 30px;
            align-items: center;
        }
        
        .main-image {
            grid-column: 1 / -1;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .main-image:hover {
            transform: scale(1.02);
        }
        
        .secondary-image {
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        
        .secondary-image:hover {
            transform: scale(1.03);
        }
        
        .decorative-image {
            position: absolute;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
            transition: transform 0.3s ease;
        }
        
        .decorative-image:hover {
            transform: rotate(5deg);
        }
        
        img {
            max-width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="header">
            <div id="html_1" data-json-id="1" class="part-number">Part 04</div>
        </div>
        
        <div class="content-container">
            <div class="text-content">
                <h2 id="html_b2_c1" data-json-id="b2_c1" class="chapter-title">请输入章节标题</h2>
                <p id="html_b2_c2" data-json-id="b2_c2" class="chapter-text">Life isn't about waiting for the storm to pass. it's about learning to dance Life isn't it's about learning to dance in the rain.</p>
            </div>
            
            <div class="image-grid">
                <div class="main-image">
                    <img id="html_b2_c0" data-json-id="b2_c0" src="output/images/slide_14_img_5131536384.png" alt="Main content image">
                </div>
                <div class="secondary-image">
                    <img id="html_b0_c0" data-json-id="b0_c0" src="output/images/slide_14_img_5131536192.png" alt="Secondary image 1">
                </div>
                <div class="secondary-image">
                    <img id="html_b0_c1" data-json-id="b0_c1" src="output/images/slide_14_img_5131536240.png" alt="Secondary image 2">
                </div>
            </div>
        </div>
        
        <img id="html_3" data-json-id="3" class="decorative-image" src="output/images/slide_14_img_5131535712.png" alt="Decorative image" style="left: -50px; bottom: 100px; width: 346px;">
        <img id="html_4" data-json-id="4" class="decorative-image" src="output/images/slide_14_img_5131535232.png" alt="Decorative image" style="right: 200px; bottom: 50px; width: 246px;">
        <img id="html_b2_c3" data-json-id="b2_c3" class="decorative-image" src="output/images/slide_14_img_5131535952.png" alt="Decorative image" style="right: 50px; top: 50%; transform: translateY(-50%); width: 467px;">
    </div>
</body>
</html>
